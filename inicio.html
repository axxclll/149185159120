<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXRTYS</title>

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
/* ===== Reset básico ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    width: 100%;
    height: 100%;
    font-family: 'Bangers', cursive;
    overflow: hidden;
    background: black;
    color: white;
}

/* ===== Video de fondo ===== */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: grayscale(100%) blur(5px);
}

/* ===== Overlay cráneos estilo ejemplo ===== */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('overlay.png');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    z-index: -1;
}

/* ===== Contenedor principal ===== */
.intro-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* ===== Logo giratorio ===== */
.logo-container {
    margin-bottom: 30px;
}

.logo {
    width: 270px;
    animation: rotateLogo 6s linear infinite;
}

@keyframes rotateLogo {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
}

/* ===== Contenedor candado ===== */
#lockBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

/* Candado en blanco y negro */
#lockIcon {
    font-size: 60px;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

#lockIcon:hover {
    color: #888;
}

/* Caja de contraseña */
#passwordBox {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* Input estilo moderno */
#passwordBox input {
    padding: 14px 20px;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid #fff;
    background: rgba(0,0,0,0.6);
    color: #fff;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

#passwordBox input:focus {
    outline: none;
    border-color: #ccc;
    background: rgba(0,0,0,0.8);
}

/* Botón estilo Fortnite */
#passwordBox button {
    padding: 14px 30px;
    font-size: 20px;
    border-radius: 10px;
    border: 2px solid #fff;
    background: rgba(0,0,0,0.6);
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
    box-shadow: 0 0 10px #fff;
}

#passwordBox button:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 0 20px #fff;
}

#passwordBox button:active {
    color: #888;
    transform: scale(0.98);
    box-shadow: 0 0 15px #fff;
}

/* Error */
#error {
    color: #ff4444;
    font-size: 14px;
    display: none;
}

/* ===== Animaciones fade ===== */
body.fade-in {
    animation: fadeIn 1s ease forwards;
}

body.fade-out {
    animation: fadeOut 0.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}
</style>
</head>
<body class="fade-in">

<!-- Video de fondo -->
<video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
</video>

<!-- Overlay opcional con cráneos -->
<div id="overlay"></div>

<!-- Contenido -->
<div class="intro-container">
    <!-- Logo giratorio -->
    <div class="logo-container">
        <img src="logo.png" alt="Logo" class="logo">
    </div>

    <!-- Candado y contraseña -->
    <div id="lockBox">
        <div id="lockIcon">&#128274;</div> <!-- candado 🔒 -->

        <div id="passwordBox">
            <input type="password" id="passwordInput" placeholder="Key">
            <button id="enterBtn">ENTER</button>
            <div id="error">Contraseña incorrecta</div>
        </div>
    </div>
</div>

<!-- Sonido click -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- Música de fondo -->
<audio id="bgMusic" loop>
    <source src="lobby.mp3" type="audio/mpeg">
</audio>

<script>
// Elementos
const btn = document.getElementById("enterBtn");
const sound = document.getElementById("clickSound");
const passwordInput = document.getElementById("passwordInput");
const errorMsg = document.getElementById("error");
const music = document.getElementById("bgMusic");

// Contraseña
const correctPassword = "prueba";

// Mostrar passwordBox y ocultar candado
const lockIcon = document.getElementById("lockIcon");
const passwordBox = document.getElementById("passwordBox");

lockIcon.addEventListener("click", () => {
    passwordBox.style.display = "flex";
    lockIcon.style.display = "none"; // desaparecer candado
});

// Manejo del botón Enter
btn.addEventListener("click", function(e){
    e.preventDefault();
    const enteredPassword = passwordInput.value;

    if(enteredPassword === correctPassword){
        sound.currentTime = 0;
        sound.play();
        document.body.classList.add("fade-out");
        setTimeout(()=>{
            window.location.href = "index.html";
        }, 500);
    } else {
        errorMsg.style.display = "block";
    }
});

// ===== Reproducir música automáticamente =====
function playMusic() {
    music.volume = 0.6;
    music.play().catch(() => {
        // Si el navegador bloquea autoplay, esperar interacción
        document.body.addEventListener('click', () => {
            music.play();
        }, { once: true });
    });
}
playMusic();

// Loop seguro del video
const bgVideo = document.getElementById("bg-video");
bgVideo.addEventListener("ended", () => {
    bgVideo.currentTime = 0;
    bgVideo.play();
});
</script>

</body>
</html>
